<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Register</title> 
    <link rel="stylesheet" href="styles.css"> 
</head> 

<body> 
    <header> 
        <h1>Register</h1> 
        <nav> 
            <a href="index.html">Home</a> | 
            <a href="login.html">Login</a> 
        </nav> 
    </header> 

    <main> 
        <p>Join us today! Fill out the form below to create an account.</p> 

        <section>
            <section class="form-wrapper">

   

          <form id="registerForm">
          <h2>Create Your Account</h2>
          <input type="email" id="email" placeholder="Enter email" required><br><br>
          <input type="password" id="password" placeholder="Enter password" required><br><br>
          <button type="submit">Register</button>
          </form>

         <p id="message"></p>

         </section>

         <script>
          document.getElementById("registerForm").addEventListener("submit", async (e) => {
         e.preventDefault();

         const email = document.getElementById("email").value.trim();
         const password = document.getElementById("password").value.trim();

           try {
             const response = await fetch("http://localhost:3000/register", {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
             },
              body: JSON.stringify({ email, password })
             });

             const result = await response.text();
              document.getElementById("message").innerText = result;

             if (result.includes("success")) {
               window.location.href = "login.html";
              }

              } catch (error) {
              console.error(error);
             document.getElementById("message").innerText = "Error connecting to server";
              }
               });
              </script>
              </section>
             

              <p>Already have an account? <a href="login.html">Login here</a>.</p>
              </main> 

                <footer> 
              <p>&copy; 2026 CramLink. All rights reserved.</p> 
             </footer> 
               </body> 
              </html>
