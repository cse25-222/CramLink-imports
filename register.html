<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Register</title> 
    <link rel="stylesheet" href="styles.css"> 
</head> 

<body> 
    <header> 
        <h1>Register</h1> 
        <nav> 
            <a href="index.html">Home</a> | 
            <a href="login.html">Login</a> 
        </nav> 
     </header> 

    <main> 
        <p>Join us today! Fill out the form below to create an account.</p> 

        <section>
            <section class="form-wrapper">

   

          <form id="registerForm">
          <h2>Create Your Account</h2>
          <input type="email" id="email" placeholder="Enter email" required><br><br>
          <input type="password" id="password" placeholder="Enter password" required><br><br>
          <button type="submit">Register</button>
          <p>Already have an account? <a href="login.html">Login here</a>.</p> 
          </form>

         <p id="message"></p>

         </section>
         <script>
           document.getElementById("registerForm").addEventListener("submit", function(e) {

            e.preventDefault();

           const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

           // simple validation
           if(email === "" || password === "") {
             document.getElementById("message").innerText = "Please fill all fields";
            return;
          }

           // success message
            document.getElementById("message").innerText = "Registration successful! Redirecting to login...";

          // redirect after 2 seconds
           setTimeout(() => {
            window.location.href = "login.html";
            }, 2000);

         });
           </script>
            

              
              
            </main>
                <footer> 
              <p>&copy; 2026 CramLink. All rights reserved.</p> 
             </footer> 
               </body> 
              </html>
