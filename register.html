<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Register</title> 
    <link rel="stylesheet" href="styles.css"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head> 

         <body> 
          <header> 
          <h1>Register</h1> 
           <nav> 
            <a href="index.html" class="btn btn-primary">Home</a> |
            <a href="login.html" class="btn btn-primary">Login</a>
          </nav> 
          </header> 

         <main> 
         <p>Join us today! Fill out the form below to create an account.</p> 

    
          <section class="form-wrapper">

   

          <form id="registerForm"> 
          <h2>Create Your Account</h2>
          <input type="email" class="form-control" id="email" placeholder="Enter email" required><br><br>
          <input type="password" class="form-control" id="password" placeholder="Enter password" required><br><br>
          <button type="submit" class="btn btn-primary">Register</button>
          <p>Already have an account? <a href="login.html" class="btn btn-primary">Login here</a>.</p> 
          </form>

         <p id="message"></p>

         </section>
         <script>
           document.getElementById("registerForm").addEventListener("submit", function(e) {

            e.preventDefault();

           const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

           // simple validation
           if(email === "" || password === "") {
             document.getElementById("message").innerText = "Please fill all fields";
            return;
          }

           // success message
            document.getElementById("message").innerText = "Registration successful! Redirecting to login...";

          // redirect after 2 seconds
           setTimeout(() => {
            window.location.href = "login.html";
            }, 2000);

         });
           </script>
            

              
              
            </main>
                <footer> 
              <p>&copy; 2026 CramLink. All rights reserved.</p> 
             </footer> 
               </body> 
              </html>
