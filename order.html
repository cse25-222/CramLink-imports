<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

    <title>Order</title> 

</head> 

<body> 

    <header> 

        <h1>Order</h1> 

        <nav> 
         
            <a href="order.html">Order</a> |
            <a href="logout.html">Logout</a> | 
            <a href="index.html">Home</a>
          <link rel="stylesheet" href="styles.css">
        </nav>

    </header>

<main>

    <p>Place your order here! Fill out the form below to submit your order.</p>

<script>

function submitOrder(event){

event.preventDefault();

var email = document.getElementById("email").value;
var link = document.getElementById("productLink").value;
var card = document.getElementById("cardNumber").value;

var emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
var linkPattern = /^(https?:\/\/)/;

if(!email.match(emailPattern)){
alert("Please enter a valid email address.");
return;
}

if(!link.match(linkPattern)){
alert("Please enter a valid product link starting with http or https.");
return;
}

if(card.length < 16){
alert("Please enter a valid card number.");
return;
}

alert("Order Submitted Successfully!");

window.location.href = "status.html";

}

</script>

</head>

<body>

<h1>CramLink Imports Order</h1>

<form onsubmit="submitOrder(event)">

<label>Email (Username)</label><br>
<input type="email" id="email" placeholder="example@email.com" required><br><br>

<label>Product Link</label><br>
<input type="url" id="productLink" placeholder="https://product-link.com" required><br><br>

<label>Product Description</label><br>
<textarea placeholder="Describe the item"></textarea><br><br>

<label>Quantity</label><br>
<input type="number" min="1" value="1"><br><br>

<label>Bank</label><br>
<select id="bank">
<option>First National Bank (FNB)</option>
<option>Absa Bank Botswana</option>
<option>Standard Chartered</option>
<option>Bank Gaborone</option>
<option>Stanbic Bank</option>
</select><br><br>

<label>Card Number</label><br>
<input type="text" id="cardNumber" placeholder="Enter 16-digit card number" maxlength="16" required><br><br>

<button type="submit">Submit Order</button>
</form>

    </main>

</body>
</html>
