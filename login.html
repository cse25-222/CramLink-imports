<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Login</title> 
    <link rel="stylesheet" href="styles.css"> 
</head> 

<body> 
    <header> 
        <h1>Login</h1> 
        <nav> 
            <a href="index.html">Home</a> | 
            <a href="register.html">Register</a> 
        </nav> 
     </header> 

     <main> 
        <p>Welcome back! Please log in to your account.</p>
        
         <section>
            <section class="form-wrapper">

         <form id="loginForm">
            <h2>Login</h2>
         <input type="email" id="email" placeholder="Enter email" required><br><br>
         <input type="password" id="password" placeholder="Enter password" required><br><br>
         <button type="submit">Login</button>
         <p>Don't have an account? <a href="register.html">Register here</a>.</p>
    </form>

    <p id="message"></p>
</section>
                <script>  
            
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  if (email === "" || password === "") {
    document.getElementById("message").innerText = "Fill all fields";
    return;
  }

  document.getElementById("message").innerText = "Login successful";

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1000);
});
</script>
        </main>
            <footer> 
              <p>&copy; 2026 CramLink. All rights reserved.</p> 
             </footer>
</body> 
</html>
