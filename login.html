<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Login</title> 
    <link rel="stylesheet" href="styles.css"> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head> 

<body> 
    <header> 
        <h1>Login</h1> 
        <nav> 
            <a href="index.html" class="btn btn-primary">Home</a> | 
            <a href="register.html" class="btn btn-primary">Register</a>
        </nav> 
     </header> 

     <main> 
        <p>Welcome back! Please log in to your account.</p>
        
         <section>
            <section class="form-wrapper">

         <form id="loginForm">
            <h2>Login</h2>
         <input type="email" class="form-control" id="email" placeholder="Enter email" required><br><br>
         <input type="password" class="form-control" id="password" placeholder="Enter password" required><br><br>
         <button type="submit" class="btn btn-primary">Login</button>
         <p>Don't have an account? <a href="register.html" class="btn btn-primary">Register here</a>.</p>
    </form>

    <p id="message"></p>
</section>
               <script>
document.getElementById("loginForm").addEventListener("submit", function(e) {

    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    // simple validation
    if(email === "" || password === "") {
        document.getElementById("message").innerText = "Please fill all fields";
        return;
    }

    // login success
    document.getElementById("message").innerText = "Login successful! Redirecting...";

    // simulate logged in user
    localStorage.setItem("loggedIn", "true");

    // redirect to dashboard
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 1500);

});
</script>
        </main>
            <footer> 
              <p>&copy; 2026 CramLink. All rights reserved.</p> 
             </footer>
</body> 
</html>
