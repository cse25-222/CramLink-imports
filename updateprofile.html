<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Update Profile</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Update Profile</h1>
    <nav>
      <a href="dashboard.html" class="btn btn-primary">Dashboard</a> |
      <a href="logout.html" class="btn btn-primary">Logout</a> |
      <a href="index.html" class="btn btn-primary">Home</a>
    </nav>
  </header>

  <main>
    <h2>Update Your Profile</h2>
    <p>Use the form below to update your personal information. Make sure all fields are correct before submitting.</p>

    <section>
      <section class="form-wrapper">
      <form action="/updateprofile" method="post">
      <form id="updateForm"  action="/update-profile" method="post">
        <label for="fullname">Full Name:</label><br>
        <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Your full name" required><br><br>

        <label for="username">Username:</label><br>
        <input type="text" class="form-control" id="username" name="username" placeholder="Your username" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" class="form-control" id="email" name="email" placeholder="example@domain.com" required><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" class="form-control" id="phone" name="phone" placeholder="+267 7XXXXXXX"><br><br>

        <label for="password">New Password:</label><br>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter new password"><br><br>

        <label for="confirm_password">Confirm New Password:</label><br>
        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm new password"><br><br>

        <label for="address">Address:</label><br>
        <input type="text" class="form-control" id="address" name="address" placeholder="Street, City, Country"><br><br>

        <label for="bio">Bio (optional):</label><br>
        <textarea class="form-control" id="bio" name="bio" rows="4" cols="50" placeholder="Tell us something about yourself..."></textarea><br><br>

        <button type="submit" class="btn btn-primary">Update Profile</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 CramLink. All rights reserved.</p>
  </footer>

  <script>
    document.getElementById("updateForm").addEventListener("submit", function(e) {
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirm_password").value;

      if (password && password !== confirmPassword) {
        e.preventDefault();
        alert("Passwords do not match. Please try again.");
      }
    });
  </script>
</body>
</html>
